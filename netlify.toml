# Netlify build & deploy config for the keyforme Astro site.
# Every push to `main` triggers an automatic build + deploy.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-cache hashed assets, no-cache HTML (so content updates show immediately).
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
