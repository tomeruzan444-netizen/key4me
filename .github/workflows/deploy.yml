name: Build & Deploy to Hostinger

# Every push to main: build the Astro site and upload dist/ to Hostinger via FTP.
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allows manual run from the Actions tab

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          # The Hostinger FTP account is already rooted at public_html, so upload
          # to the FTP root ("./"), NOT "/public_html/" (which nests one level deep).
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
